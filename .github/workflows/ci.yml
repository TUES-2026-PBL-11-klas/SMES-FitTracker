name: CI Pipeline

on:
  push:
    branches: [main, login-register, workout-planner]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fittracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fittracker_test
          SECRET_KEY: test-secret-key
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=html -v

      - name: Check coverage threshold
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fittracker_test
          SECRET_KEY: test-secret-key
        run: |
          pytest --cov=app --cov-fail-under=50

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fittracker:${{ github.sha }} .

      - name: Verify Docker image
        run: docker run --rm fittracker:${{ github.sha }} python -c "from app import create_app; print('OK')"
